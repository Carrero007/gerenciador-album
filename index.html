<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Álbum Copa 2026 · Entrar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── VARIÁVEIS (espelha estilos.css) ── */
:root {
  --cobalt:   #2563eb;
  --cobalt-2: #1d4ed8;
  --navy:     #1e3a5f;
  --yellow:   #f0b429;
  --yellow-2: #d49e1f;
  --turq:     #0ea5a0;
  --turq-2:   #0d9490;
  --bg:       #0d1117;
  --bg2:      #161b22;
  --bg3:      #0d1117;
  --surf:     #1c2333;
  --surf2:    #21293a;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(14,165,160,0.25);
  --t1:       #e6edf3;
  --t2:       #8b9bb4;
  --t3:       #4a5568;
  --owned:    #22c55e;
  --missing:  #f87171;
  --r:        10px;
  --rs:       7px;
  --sh:       0 4px 24px rgba(0,0,0,.5);
  --ease:     cubic-bezier(0.16,1,0.3,1);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
html,body { height:100%; }
body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--t1);
  font-size: 14px;
  line-height: 1.5;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow-x: hidden;
}
button { cursor:pointer; font-family:inherit; border:none; background:none }
input  { font-family:inherit }
::-webkit-scrollbar { width:3px }
::-webkit-scrollbar-thumb { background:var(--surf2); border-radius:2px }

/* ── FUNDO DECORATIVO ── */
body::before {
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 0%, rgba(37,99,235,.1), transparent 55%),
    radial-gradient(ellipse 40% 30% at 90% 100%, rgba(14,165,160,.07), transparent 55%);
}
body::after {
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 28px 28px;
}

/* ── LOADER ── */
#loader {
  position:fixed; inset:0; z-index:9999; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
.ld-ball {
  width:40px; height:40px; border-radius:50%;
  border:2px solid var(--surf2); border-top-color:var(--yellow);
  animation:spin .7s linear infinite;
}
.ld-txt {
  font-family:'Barlow Condensed',sans-serif; font-size:.78rem;
  letter-spacing:3px; color:var(--t3); text-transform:uppercase;
}
@keyframes spin { to { transform:rotate(360deg) } }

/* ── WRAPPER ── */
.auth-wrap {
  position:relative; z-index:1;
  width:100%; max-width:420px;
  padding:24px 20px;
  animation: fadeUp .5s var(--ease) both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

/* ── LOGO TOPO ── */
.auth-brand {
  text-align:center; margin-bottom:28px;
}
.auth-ball { font-size:2.8rem; line-height:1; display:block; margin-bottom:6px }
.auth-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:2.1rem; letter-spacing:3px;
  background: linear-gradient(90deg, var(--yellow), var(--turq));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
}
.auth-subtitle {
  font-family:'Barlow Condensed',sans-serif; font-size:.68rem;
  letter-spacing:3px; text-transform:uppercase; color:var(--t3); margin-top:5px;
}

/* ── CARD ── */
.auth-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:14px; padding:24px; box-shadow:var(--sh);
  position:relative; overflow:hidden;
}
.auth-card::before {
  content:""; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, var(--cobalt), var(--turq));
}

/* ── TABS LOGIN/CADASTRO ── */
.auth-tabs {
  display:flex; gap:0; margin-bottom:22px;
  background:var(--surf); border-radius:var(--rs); padding:3px;
}
.auth-tab {
  flex:1; padding:8px; border-radius:calc(var(--rs) - 1px);
  font-family:'Barlow Condensed',sans-serif; font-size:.82rem; font-weight:700;
  letter-spacing:.5px; color:var(--t3); transition:.18s var(--ease);
}
.auth-tab.on {
  background:var(--bg2); color:var(--t1);
  box-shadow:0 1px 6px rgba(0,0,0,.4);
}

/* ── PAINEL ── */
.auth-panel { display:none }
.auth-panel.active { display:block }

/* ── LABEL + INPUT ── */
.field { margin-bottom:14px }
.field-label {
  display:block; font-family:'Barlow Condensed',sans-serif;
  font-size:.65rem; letter-spacing:2px; text-transform:uppercase;
  color:var(--t3); font-weight:700; margin-bottom:6px;
}
.field-input {
  width:100%; background:var(--surf); border:1px solid var(--border);
  border-radius:var(--rs); color:var(--t1); padding:10px 13px;
  font-size:.9rem; outline:none; transition:.15s;
  -webkit-appearance:none; appearance:none;
}
.field-input:focus { border-color:var(--border2); background:var(--surf2) }
.field-input::placeholder { color:var(--t3) }
.field-input.err { border-color:rgba(248,113,113,.5) }

.field-hint {
  font-size:.65rem; color:var(--t3); margin-top:4px; line-height:1.4;
}

/* ── BOTÃO PRIMÁRIO ── */
.btn-auth {
  width:100%; padding:12px; border-radius:var(--rs);
  background:linear-gradient(135deg, var(--cobalt), var(--turq));
  color:#fff; font-family:'Barlow Condensed',sans-serif;
  font-size:.9rem; font-weight:700; letter-spacing:.5px;
  transition:.18s var(--ease); margin-top:4px;
  display:flex; align-items:center; justify-content:center; gap:7px;
  box-shadow:0 2px 12px rgba(37,99,235,.3);
}
.btn-auth:hover { opacity:.9; transform:translateY(-1px) }
.btn-auth:active { transform:scale(.98) }
.btn-auth:disabled { opacity:.45; cursor:not-allowed; transform:none }

/* ── SPINNER inline ── */
.spin-sm {
  width:15px; height:15px; border-radius:50%;
  border:2px solid rgba(255,255,255,.3); border-top-color:#fff;
  animation:spin .6s linear infinite; display:none;
}
.btn-auth.loading .spin-sm { display:block }
.btn-auth.loading .btn-label { display:none }

/* ── ERRO/SUCESSO ── */
.auth-msg {
  padding:9px 13px; border-radius:var(--rs); font-size:.78rem;
  font-weight:600; margin-bottom:14px; display:none; line-height:1.4;
}
.auth-msg.err  { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.3); color:var(--missing) }
.auth-msg.ok   { background:rgba(34,197,94,.08);  border:1px solid rgba(34,197,94,.25);  color:var(--owned) }
.auth-msg.show { display:block }

/* ── RODAPÉ ── */
.auth-footer {
  text-align:center; margin-top:18px;
  font-size:.68rem; color:var(--t3);
  font-family:'Barlow Condensed',sans-serif; letter-spacing:.5px;
}

/* ── SENHA TOGGLE ── */
.field-pw { position:relative }
.field-pw .field-input { padding-right:40px }
.pw-toggle {
  position:absolute; right:11px; top:50%; transform:translateY(-50%);
  font-size:.85rem; color:var(--t3); cursor:pointer; transition:.12s;
  background:none; border:none; padding:2px;
}
.pw-toggle:hover { color:var(--t2) }

/* ── FORÇA DE SENHA ── */
.pw-strength { display:flex; gap:4px; margin-top:6px }
.pw-seg { flex:1; height:3px; border-radius:2px; background:var(--surf2); transition:.3s }
.pw-seg.s1 { background:var(--missing) }
.pw-seg.s2 { background:var(--yellow) }
.pw-seg.s3 { background:var(--turq) }
.pw-seg.s4 { background:var(--owned) }
</style>
</head>
<body>

<div id="loader">
  <div class="ld-ball"></div>
  <div class="ld-txt">Carregando...</div>
</div>

<div class="auth-wrap" id="auth-wrap" style="display:none">

  <div class="auth-brand">
    <span class="auth-ball">⚽</span>
    <div class="auth-title">Copa 2026</div>
    <div class="auth-subtitle">Gerenciador de Figurinhas</div>
  </div>

  <div class="auth-card">

    <div class="auth-tabs">
      <button class="auth-tab on" id="tab-login"    onclick="showTab('login')">🔐 Entrar</button>
      <button class="auth-tab"    id="tab-cadastro" onclick="showTab('cadastro')">➕ Cadastrar</button>
    </div>

    <!-- ── PAINEL LOGIN ── -->
    <div class="auth-panel active" id="panel-login">
      <div class="auth-msg" id="login-msg"></div>

      <div class="field">
        <label class="field-label" for="login-cpf">CPF</label>
        <input class="field-input" id="login-cpf" type="tel" inputmode="numeric"
          maxlength="14" placeholder="000.000.000-00" autocomplete="username"
          oninput="maskCPF(this)" onkeydown="enterSubmit(event,'doLogin')">
      </div>

      <div class="field">
        <label class="field-label" for="login-senha">Senha</label>
        <div class="field-pw">
          <input class="field-input" id="login-senha" type="password"
            placeholder="Sua senha" autocomplete="current-password"
            onkeydown="enterSubmit(event,'doLogin')">
          <button class="pw-toggle" onclick="togglePw('login-senha',this)" tabindex="-1">👁</button>
        </div>
      </div>

      <button class="btn-auth" id="btn-login" onclick="doLogin()">
        <div class="spin-sm"></div>
        <span class="btn-label">Entrar</span>
      </button>
    </div>

    <!-- ── PAINEL CADASTRO ── -->
    <div class="auth-panel" id="panel-cadastro">
      <div class="auth-msg" id="cad-msg"></div>

      <div class="field">
        <label class="field-label" for="cad-cpf">CPF</label>
        <input class="field-input" id="cad-cpf" type="tel" inputmode="numeric"
          maxlength="14" placeholder="000.000.000-00" autocomplete="off"
          oninput="maskCPF(this)">
        <div class="field-hint">Será usado como seu login único.</div>
      </div>

      <div class="field">
        <label class="field-label" for="cad-nome">Nome completo</label>
        <input class="field-input" id="cad-nome" type="text"
          placeholder="Seu nome" autocomplete="name">
      </div>

      <div class="field">
        <label class="field-label" for="cad-apelido">Apelido</label>
        <input class="field-input" id="cad-apelido" type="text"
          placeholder="Como você quer ser chamado" autocomplete="nickname">
      </div>

      <div class="field">
        <label class="field-label" for="cad-senha">Senha</label>
        <div class="field-pw">
          <input class="field-input" id="cad-senha" type="password"
            placeholder="Mínimo 6 caracteres" autocomplete="new-password"
            oninput="checkPwStrength(this)">
          <button class="pw-toggle" onclick="togglePw('cad-senha',this)" tabindex="-1">👁</button>
        </div>
        <div class="pw-strength" id="pw-segs">
          <div class="pw-seg" id="ps1"></div>
          <div class="pw-seg" id="ps2"></div>
          <div class="pw-seg" id="ps3"></div>
          <div class="pw-seg" id="ps4"></div>
        </div>
      </div>

      <button class="btn-auth" id="btn-cad" onclick="doCadastrar()">
        <div class="spin-sm"></div>
        <span class="btn-label">Criar conta</span>
      </button>
    </div>

  </div><!-- /auth-card -->

  <div class="auth-footer">⚽ Copa do Mundo 2026 &nbsp;·&nbsp; Álbum Manager</div>

</div><!-- /auth-wrap -->

<script>
// ─────────────────────────────────────────────────────────────
// ⚠️  ATENÇÃO: USE A MESMA URL DO script.js — apenas UM deployment!
// Copie a URL do seu Apps Script publicado e cole aqui E no script.js
// ─────────────────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxsuN--bn4JnOwdq9sjmIbvEzhjHU9eBhb_EWzSIzY-1RuJzmxXgQIynk1E7hwUg5Z8Q/exec';
//                  ↑ MESMA URL que está no script.js — NÃO use duas URLs diferentes!

// ─────────────────────────────────────────────────────────────
// SESSÃO — salva no localStorage
// ─────────────────────────────────────────────────────────────
const AUTH = {
  KEY: 'copa26_usuario',

  salvar(usuario) {
    localStorage.setItem(this.KEY, JSON.stringify(usuario));
  },

  obter() {
    try { return JSON.parse(localStorage.getItem(this.KEY) || 'null'); }
    catch { return null; }
  },

  limpar() { localStorage.removeItem(this.KEY); }
};

// ─────────────────────────────────────────────────────────────
// INIT — redireciona se já logado
// ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const u = AUTH.obter();
  if (u && u.cpf) {
    window.location.href = 'app.html';
    return;
  }
  document.getElementById('loader').style.display = 'none';
  document.getElementById('auth-wrap').style.display = 'block';
});

// ─────────────────────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────────────────────
function showTab(t) {
  ['login','cadastro'].forEach(id => {
    document.getElementById('panel-'+id).classList.toggle('active', id===t);
    document.getElementById('tab-'+id).classList.toggle('on', id===t);
  });
  clearMsg('login-msg'); clearMsg('cad-msg');
}

// ─────────────────────────────────────────────────────────────
// LOGIN
// ─────────────────────────────────────────────────────────────
async function doLogin() {
  let cpf     = onlyDigits(document.getElementById('login-cpf').value);
  const senha = document.getElementById('login-senha').value.trim();

  if (!cpf || !senha) { return showMsg('login-msg', 'Preencha CPF e senha.', true); }

  // Normaliza CPF: garante 11 dígitos (com zero à esquerda se necessário)
  if (cpf.length === 10) cpf = '0' + cpf;
  if (cpf.length !== 11) {
    return showMsg('login-msg', 'CPF inválido. Verifique e tente novamente.', true);
  }

  setLoading('btn-login', true);
  clearMsg('login-msg');

  const r = await apiFetch({ acao:'login', cpf, senha });

  setLoading('btn-login', false);

  if (r === null) {
    return showMsg('login-msg', 'Sem conexão com o servidor. Verifique a URL do Apps Script e tente novamente.', true);
  }

  if (r.ok) {
    AUTH.salvar(r.usuario);
    showMsg('login-msg', `✅ Bem-vindo, ${r.usuario.apelido}! Carregando...`, false);
    setTimeout(() => window.location.href = 'app.html', 800);
  } else {
    const msgs = {
      senha_incorreta:        'Senha incorreta.',
      usuario_nao_encontrado: 'CPF não encontrado. Verifique ou cadastre-se.',
      campos_obrigatorios:    'Preencha todos os campos.',
      cpf_ausente:            'CPF não informado.'
    };
    showMsg('login-msg', msgs[r.motivo] || `Erro: ${r.erro || r.motivo || 'desconhecido'}`, true);
  }
}

// ─────────────────────────────────────────────────────────────
// CADASTRO
// ─────────────────────────────────────────────────────────────
async function doCadastrar() {
  let cpf       = onlyDigits(document.getElementById('cad-cpf').value);
  const nome    = document.getElementById('cad-nome').value.trim();
  const apelido = document.getElementById('cad-apelido').value.trim();
  const senha   = document.getElementById('cad-senha').value.trim();

  if (!cpf || !nome || !apelido || !senha) {
    return showMsg('cad-msg', 'Preencha todos os campos.', true);
  }

  // Normaliza CPF: garante 11 dígitos
  if (cpf.length === 10) cpf = '0' + cpf;
  if (cpf.length !== 11) {
    return showMsg('cad-msg', `CPF inválido (${cpf.length} dígitos). Verifique e tente novamente.`, true);
  }
  if (senha.length < 6) {
    return showMsg('cad-msg', 'Senha deve ter pelo menos 6 caracteres.', true);
  }

  setLoading('btn-cad', true);
  clearMsg('cad-msg');

  const r = await apiFetch({ acao:'cadastrar', cpf, nome, apelido, senha });

  setLoading('btn-cad', false);

  if (r === null) {
    return showMsg('cad-msg', 'Sem conexão com o servidor. Verifique a URL do Apps Script e tente novamente.', true);
  }

  if (r.ok) {
    AUTH.salvar(r.usuario);
    showMsg('cad-msg', '✅ Conta criada! Redirecionando...', false);
    setTimeout(() => window.location.href = 'app.html', 900);
  } else {
    const msgs = {
      cpf_duplicado:       'Este CPF já está cadastrado. Faça login.',
      cpf_invalido:        'CPF inválido. Verifique os dígitos.',
      campos_obrigatorios: 'Preencha todos os campos.',
      erro_interno:        `Erro interno: ${r.erro || 'contate o suporte'}`
    };
    const motivo = r.motivo || 'erro_interno';
    showMsg('cad-msg', msgs[motivo] || `Erro: ${r.erro || r.motivo || 'desconhecido'}`, true);
  }
}

// ─────────────────────────────────────────────────────────────
// HELPERS UI
// ─────────────────────────────────────────────────────────────
function showMsg(id, txt, isErr) {
  const el = document.getElementById(id);
  el.textContent = txt;
  el.className = 'auth-msg show ' + (isErr ? 'err' : 'ok');
}
function clearMsg(id) {
  const el = document.getElementById(id);
  el.className = 'auth-msg'; el.textContent = '';
}
function setLoading(id, on) {
  const el = document.getElementById(id);
  el.classList.toggle('loading', on);
  el.disabled = on;
}
function enterSubmit(e, fn) {
  if (e.key === 'Enter') window[fn]();
}
function togglePw(id, btn) {
  const i = document.getElementById(id);
  const show = i.type === 'password';
  i.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}

// Máscara CPF
function maskCPF(el) {
  let v = onlyDigits(el.value).slice(0,11);
  if (v.length > 9)      v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');
  else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/,'$1.$2');
  el.value = v;
}
function onlyDigits(s) { return s.replace(/\D/g,''); }

// Força de senha
function checkPwStrength(el) {
  const v = el.value;
  let score = 0;
  if (v.length >= 6)  score++;
  if (v.length >= 10) score++;
  if (/[A-Z]/.test(v) || /[0-9]/.test(v)) score++;
  if (/[^a-zA-Z0-9]/.test(v)) score++;
  const cls = ['','s1','s2','s3','s4'];
  for (let i = 1; i <= 4; i++) {
    const seg = document.getElementById('ps'+i);
    seg.className = 'pw-seg ' + (i <= score ? cls[score] : '');
  }
}

// ─────────────────────────────────────────────────────────────
// API FETCH — com timeout de 15s e log de erro detalhado
// ─────────────────────────────────────────────────────────────
async function apiFetch(params) {
  if (!SCRIPT_URL || !SCRIPT_URL.startsWith('https://script.google.com/macros/s/')) {
    console.error('[Copa26] SCRIPT_URL não configurada!');
    return null;
  }
  try {
    const qs = Object.entries(params)
      .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
      .join('&');
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), 15000);
    const resp = await fetch(`${SCRIPT_URL}?${qs}`, { signal: ctrl.signal });
    clearTimeout(tid);
    const text = await resp.text();
    try {
      return JSON.parse(text);
    } catch {
      console.error('[Copa26] Resposta não-JSON do servidor:', text.slice(0, 300));
      return null;
    }
  } catch(e) {
    console.warn('[Copa26 Auth]', e.message);
    return null;
  }
}
</script>
</body>
</html>
